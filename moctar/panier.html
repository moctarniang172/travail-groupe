<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Mon Panier</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
      <div class="m-8 fixed">
      <i class="fa-solid fa-angle-left"></i>
      <a href="../index.html">Retour</a>
    </div>
    

<div class="container mx-auto px-4 py-10">
   <div class="flex gap-4">
      <div class="mt-2"><i class="fa-solid fa-cart-shopping"></i></div>
     <div><h1 class="text-3xl font-bold mb-8 text-bleu"></i> Mon Panier</h1></div>

   </div>
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <!-- Liste des produits -->
        <div class="lg:col-span-2 bg-white p-6 rounded-lg shadow">
            
            <!-- Produit 1 -->
            <div class="flex items-center justify-between border-b pb-4 mb-4">
                
                <div class="flex items-center gap-4">
                    <img src="../images/img-1.jpeg" class="w-20 h-20 object-cover rounded" alt="">
                    
                    <div>
                        <h2 class="font-semibold text-lg">Chaussure Nike</h2>
                        <p class="text-gray-500">Prix : 25 000 FCFA</p>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <!-- Quantité -->
                    <div class="flex items-center border rounded">
                        <button class="px-3 py-1">-</button>
                        <input type="text" value="1" class="w-10 text-center outline-none">
                        <button class="px-3 py-1">+</button>
                    </div>

                    <!-- Total -->
                    <p class="font-semibold">25 000 FCFA</p>

                    <!-- Supprimer -->
                    <button class="text-red-500 hover:text-red-700">Supprimer</button>
                </div>
            </div>

            <!-- Produit 2 -->
            <div class="flex items-center justify-between">
                
                <div class="flex items-center gap-4">
                    <img src="/L&na/IMAGE/Fine Islamic Men Thobes _ Jubah by Toobaa Singapore.jpg" class="w-20 h-20 object-cover rounded" alt="">
                    
                    <div>
                        <h2 class="font-semibold text-lg">Quamis Priere</h2>
                        <p class="text-gray-500">Prix : 8 000 FCFA</p>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <div class="flex items-center border rounded">
                        <button class="px-3 py-1">-</button>
                        <input type="text" value="2" class="w-10 text-center outline-none">
                        <button class="px-3 py-1">+</button>
                    </div>

                    <p class="font-semibold">16 000 FCFA</p>

                    <button class="text-red-500 hover:text-red-700">Supprimer</button>
                </div>
            </div>

        </div>

        <!-- Résumé commande -->
        <div class="bg-white p-6 rounded-lg shadow h-fit">
            
            <h2 class="text-xl font-semibold mb-4">Résumé</h2>

            <div class="flex justify-between mb-2">
                <span>Sous-total</span>
                <span>41 000 FCFA</span>
            </div>

            <div class="flex justify-between mb-2">
                <span>Livraison</span>
                <span>2 000 FCFA</span>
            </div>

            <div class="border-t my-4"></div>

            <div class="flex justify-between font-bold text-lg">
                <span>Total</span>
                <span>43 000 FCFA</span>
            </div>

           <a href="../rama\paiement.html">
             <button class="mt-6 w-full bg-bleu text-white py-3 rounded hover:bg-gray-800 transition">
                Passer la commande
            </button>
           </a>

        </div>

    </div>
</div>

<script src="../index.js"></script>

</body>
</html>
